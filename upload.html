<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Upload Photo | AlecWorld</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/upload.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<header class="navbar">

    <a href="dashboard.html" class="logo">

        Alec<span>World</span>

    </a>

    <button class="menu-toggle" id="menuToggle">

        ☰

    </button>

    <nav id="mobileMenu">

        <a href="dashboard.html">Dashboard</a>

        <a href="upload.html" class="active">Upload</a>

        <a href="index.html">Website</a>

    </nav>

</header>

<main class="upload-page">

    <div class="page-header">

        <h1>Upload New Photo</h1>

        <p>Upload an image to your AlecWorld gallery.</p>

    </div>

    <form id="uploadForm" class="upload-form">

        <div class="form-group">

            <label for="title">

                Photo Title

            </label>

            <input
                id="title"
                type="text"
                placeholder="Beautiful Sunset"
                required
            >

        </div>

        <div class="form-group">

            <label for="description">

                Description

            </label>

            <textarea
                id="description"
                rows="5"
                placeholder="Write something about this photo..."
            ></textarea>

        </div>

        <div class="form-row">

            <div class="form-group">

                <label for="album">

                    Album

                </label>

                <select id="album">

                    <option value="">

                        Loading albums...

                    </option>

                </select>

            </div>

            <div class="form-group">

                <label for="category">

                    Category

                </label>

                <select id="category">

                    <option value="">

                        Loading categories...

                    </option>

                </select>

            </div>

        </div>

        <div class="form-group checkbox-group">

            <label>

                <input
                    id="featured"
                    type="checkbox"
                >

                Featured Photo

            </label>

        </div>

        <div class="form-group">

            <label for="image">

                Choose Image

            </label>

            <input
                id="image"
                type="file"
                accept="image/*"
                required
            >

        </div>

        <div class="image-preview">

            <img
                id="preview"
                src=""
                alt="Preview"
                style="display:none;"
            >

        </div>

        <div class="progress">

            <div
                id="progressBar"
                class="progress-bar"
            ></div>

        </div>

        <p id="uploadMessage" class="upload-message"></p>

        <div class="form-actions">

            <button
                type="submit"
                class="btn"
            >

                Publish Photo

            </button>

        </div>

    </form>

</main>

<footer>

    <div class="footer-logo">

        Alec<span>World</span>

    </div>

    <p>

        AlecWorld Admin Dashboard

    </p>

</footer>

<script src="js/main.js"></script>

<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<script src="js/supabase.js"></script>

<script src="js/auth.js"></script>

<script src="js/upload.js"></script>

</body>

</html>
